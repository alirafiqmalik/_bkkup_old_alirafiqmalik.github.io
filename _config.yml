# Site Settings
title: Ali Hamza Malik
description: Research scientist specializing in formal verification, automated reasoning, and security.
url: "https://alihamzamalik.me"
baseurl: ""

# Author
author:
  name: Ali Hamza Malik
  email: ahmalik@umass.edu

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  history:
    output: false
    permalink: /history/:name/
  publications:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github

# Keep CNAME for custom domain (GitHub Pages)
keep_files:
  - CNAME
  - .nojekyll

